services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rca
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-rca_dev}
      POSTGRES_DB: rca_analyzer
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rca -d rca_analyzer"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - hf_cache:/app/.cache/huggingface
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app
      - HF_HOME=/app/.cache/huggingface
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  hf_cache:
